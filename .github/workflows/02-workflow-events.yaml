name: 02 Workflow events
on:
    push:
    workflow_dispatch:
    pull_request:
        types:
            - closed
    schedule:
        - cron: '* * * * *'         

jobs:
    echo:
        runs-on: ubuntu-latest
        steps:
            - name: Show the trigger
              run: |
                echo "Event name: ${{ github.event_name }}"